<main class="login-container">
  <div class="login-card">
    
    <div class="login-header">
      <h2>Portal del Empleado</h2>
      <p>Introduce tus credenciales para acceder al sistema</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="ejemplo@empresa.com" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">Iniciar Sesión</button>
    </form>

  </div>
</main>
